[project]
name = "fretsure-oracle"
version = "0.1.0"
description = "Deterministic guitar-playability oracle for the Fretsure arrangement agent."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "scipy>=1.11",
]

[project.optional-dependencies]
agent = [
    "anthropic>=0.40",
]
dev = [
    "pytest>=8",
    "hypothesis>=6",
    "ruff>=0.5",
    "mypy>=1.10",
    "anthropic>=0.40",
]

[project.scripts]
fretsure-bench = "fretsure.bench.runner:main"
fretsure-demo = "fretsure.demo:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fretsure"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: needs the local LLM proxy (skipped by -m 'not integration')"]

[tool.mypy]
python_version = "3.11"
strict = true

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "anthropic.*"
ignore_missing_imports = true
