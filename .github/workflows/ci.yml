name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q

      - name: Lockfile and Markdown links
        run: |
          uv lock --check
          uv run python scripts/check_markdown_links.py

      - name: Whitespace integrity
        run: git diff --check

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Frontend tests
        working-directory: web
        run: npm test

      - name: Frontend typecheck
        working-directory: web
        run: npm run typecheck

      - name: Frontend production build
        working-directory: web
        run: npm run build

      - name: Verify generated frontend assets
        run: git diff --exit-code -- src/fretsure/web_static

      - name: Frontend dependency audit
        working-directory: web
        run: npm audit --audit-level=high

      - name: Build and audit distributions
        run: |
          uv build
          uv run python scripts/audit_distributions.py
          uv run python scripts/smoke_distributions.py
