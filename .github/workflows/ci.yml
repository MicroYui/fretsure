name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/full-validation.yml"
      - ".python-version"
      - "data/**"
      - "pyproject.toml"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/full-validation.yml"
      - ".python-version"
      - "data/**"
      - "pyproject.toml"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "uv.lock"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Whitespace integrity
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check

      - name: Mypy
        run: |
          uv run mypy --strict src
          uv run mypy --strict scripts/build_benchmark_corpus.py
          uv run mypy --strict scripts/build_benchmark_prereg.py
          uv run mypy --strict scripts/build_benchmark_precall.py
          uv run mypy --strict scripts/task8_budget_gate.py
          uv run mypy --strict scripts/task8_pilot.py

      - name: Core tests
        run: uv run pytest -q -m 'not integration' --ignore=tests/bench

      - name: Lockfile
        run: uv lock --check
